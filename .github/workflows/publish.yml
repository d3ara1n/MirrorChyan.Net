name: Publish NuGet Package

on:
  push:
    branches:
      - master

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract .NET version from csproj
        id: dotnet
        run: |
          dotnet_version=$(grep '<TargetFramework>' src/MirrorChyan.Net/MirrorChyan.Net.csproj | grep -o 'net[0-9]\+\.[0-9]\+' | sed 's/net//')
          echo "dotnet_version=$dotnet_version" >> $GITHUB_OUTPUT
          echo "dotnet_framework=net${dotnet_version}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ steps.dotnet.outputs.dotnet_version }}

      - name: Install GitVersion
        uses: GitTools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.x'

      - name: Run GitVersion
        id: gitversion
        uses: GitTools/actions/gitversion/execute@v3.2.1
        with:
          useConfigFile: true

      - name: Check if version changed
        id: version-check
        run: |
          semver="${{ steps.gitversion.outputs.SemVer }}"
          if git tag -l "v${semver}" | grep -q .; then
            echo "Version v${semver} already exists, skipping release."
            echo "should_publish=false" >> $GITHUB_OUTPUT
          else
            echo "New version v${semver}, proceeding with release."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Create local tag
        if: steps.version-check.outputs.should_publish == 'true'
        run: git tag "v${{ steps.gitversion.outputs.SemVer }}"

      - name: Install git-cliff
        if: steps.version-check.outputs.should_publish == 'true'
        run: cargo install git-cliff

      - name: Pack NuGet package
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          dotnet pack src/MirrorChyan.Net/MirrorChyan.Net.csproj \
            --configuration Release \
            --output ./publish

      - name: Generate changelog
        if: steps.version-check.outputs.should_publish == 'true'
        run: git-cliff --latest -o ./CHANGELOG.md

      - name: Publish to NuGet
        if: steps.version-check.outputs.should_publish == 'true'
        run: |
          dotnet nuget push ./publish/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Push tag to remote
        if: steps.version-check.outputs.should_publish == 'true'
        run: git push origin "v${{ steps.gitversion.outputs.SemVer }}"

      - name: Create GitHub Release
        if: steps.version-check.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.SemVer }}
          name: Release v${{ steps.gitversion.outputs.SemVer }}
          body_path: ./CHANGELOG.md